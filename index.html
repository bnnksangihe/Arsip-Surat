<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arsip Surat — Kearsipan Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --paper:#ECE5D2;
    --paper-deep:#E1D7B9;
    --paper-line:#CBBE97;
    --ink:#23282B;
    --ink-soft:#5B6058;
    --ink-faint:#8A8C7E;
    --stamp:#A6342A;
    --stamp-dark:#7A2019;
    --stamp-bg:#F6E1DC;
    --gold:#9C7A2E;
    --gold-bg:#F3E7C9;
    --teal:#2F6E5C;
    --teal-bg:#DCEAE3;
    --plum:#5B4A7A;
    --plum-bg:#E6E0EF;
    --white:#FBF9F2;
    --radius:6px;
    --shadow:0 1px 2px rgba(35,40,43,0.08);
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  #arsip-app{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:var(--paper);
    padding:0;
    min-height:100%;
  }
  .masthead{
    border-bottom:3px double var(--ink);
    padding:1.5rem 1.75rem 1.1rem;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:1rem;
    flex-wrap:wrap;
  }
  .masthead h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:26px;
    margin:0 0 4px;
    letter-spacing:0.3px;
  }
  .masthead p{
    margin:0;
    font-size:13px;
    color:var(--ink-soft);
    font-style:italic;
    font-family:'Fraunces',serif;
  }
  .conn-status{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-faint);flex-shrink:0;}
  .conn-dot.on{background:var(--teal);}
  .conn-status button{
    border:0;background:none;color:var(--stamp);font-size:12.5px;
    text-decoration:underline;cursor:pointer;padding:0;font-family:'Inter',sans-serif;
  }

  .setup-card{
    margin:1.75rem;
    background:var(--white);
    border:1px solid var(--paper-line);
    border-radius:10px;
    padding:1.5rem 1.75rem;
    max-width:560px;
  }
  .setup-card h2{
    font-family:'Fraunces',serif;
    font-size:18px;
    font-weight:600;
    margin:0 0 6px;
  }
  .setup-card > p{
    font-size:13.5px;
    color:var(--ink-soft);
    margin:0 0 1.1rem;
    line-height:1.55;
  }
  .setup-steps{
    margin:0 0 1.25rem;
    padding-left:1.2rem;
    font-size:13px;
    color:var(--ink-soft);
    line-height:1.7;
  }
  .setup-steps li{margin-bottom:4px;}
  .setup-steps a, .setup-card .inline-link{color:var(--stamp);text-decoration:none;border-bottom:1px solid currentColor;}
  .setup-card label{
    display:block;font-size:12.5px;font-weight:600;color:var(--ink);
    margin-bottom:5px;
  }
  .field-row{margin-bottom:1rem;}
  input[type=text], input[type=date], select, textarea{
    width:100%;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    padding:9px 10px;
    border:1px solid var(--paper-line);
    border-radius:5px;
    background:var(--white);
    color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{
    outline:none;border-color:var(--stamp);box-shadow:0 0 0 3px var(--stamp-bg);
  }
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    padding:9px 16px;
    border-radius:5px;
    border:1px solid var(--ink);
    background:var(--white);
    color:var(--ink);
    cursor:pointer;
  }
  .btn:hover{background:var(--paper-deep);}
  .btn-primary{
    background:var(--stamp);
    border-color:var(--stamp-dark);
    color:var(--white);
  }
  .btn-primary:hover{background:var(--stamp-dark);}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .hint{font-size:11.5px;color:var(--ink-faint);margin-top:5px;line-height:1.5;}

  .toolbar{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:1rem 1.75rem;
  }
  .search-wrap{position:relative;flex:1;min-width:200px;max-width:320px;}
  .search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:15px;}
  .search-wrap input{padding-left:32px;}
  .chip-group{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{
    font-family:'Inter',sans-serif;
    font-size:12px;font-weight:500;
    padding:6px 12px;border-radius:999px;
    border:1px solid var(--paper-line);
    background:var(--white);color:var(--ink-soft);
    cursor:pointer;white-space:nowrap;
  }
  .chip.active{background:var(--ink);border-color:var(--ink);color:var(--white);}
  .toolbar-spacer{flex:1;}

  .ledger-wrap{padding:0 1.75rem 2rem;}
  table.ledger{width:100%;border-collapse:collapse;font-size:13px;background:var(--white);border-radius:8px;overflow:hidden;border:1px solid var(--paper-line);}
  table.ledger thead th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;
    color:var(--ink-soft);font-weight:600;padding:10px 12px;
    border-bottom:1px solid var(--paper-line);background:var(--paper-deep);
  }
  table.ledger tbody tr{border-bottom:1px dashed var(--paper-line);}
  table.ledger tbody tr:last-child{border-bottom:none;}
  table.ledger tbody tr:hover{background:var(--stamp-bg);}
  table.ledger td{padding:11px 12px;vertical-align:middle;color:var(--ink);}
  .no-surat{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink);}
  .perihal-cell{font-weight:500;}
  .sub-cell{font-size:11.5px;color:var(--ink-faint);margin-top:2px;}
  .badge{
    display:inline-flex;align-items:center;gap:5px;
    font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;
    border:1px dashed currentColor;
  }
  .badge.masuk{background:var(--teal-bg);color:var(--teal);}
  .badge.keluar{background:var(--plum-bg);color:var(--plum);}
  .badge.incomplete{background:var(--gold-bg);color:var(--gold);border:1px dashed var(--gold);}
  .stamp-badge{
    display:inline-flex;align-items:center;gap:5px;
    font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;
    transform:rotate(-2deg);
  }
  .stamp-badge.baru{background:var(--stamp-bg);color:var(--stamp-dark);border:1.5px solid var(--stamp);}
  .stamp-badge.proses{background:var(--gold-bg);color:var(--gold);border:1.5px solid var(--gold);}
  .stamp-badge.selesai{background:var(--teal-bg);color:var(--teal);border:1.5px solid var(--teal);}
  .row-actions{display:flex;gap:6px;align-items:center;justify-content:flex-end;}
  .icon-btn{
    border:1px solid var(--paper-line);background:var(--white);border-radius:5px;
    width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--ink-soft);
  }
  .icon-btn:hover{border-color:var(--ink);color:var(--ink);}
  .file-link{color:var(--stamp);text-decoration:none;font-size:12px;}

  .empty-state{
    text-align:center;padding:3rem 1rem;color:var(--ink-soft);
  }
  .empty-state i{font-size:26px;color:var(--ink-faint);margin-bottom:8px;display:block;}
  .empty-state p{font-size:13.5px;margin:0 0 1rem;}

  .overlay{
    position:relative;min-height:1px;
  }
  .modal-backdrop{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    width:100%;height:100%;
    background:rgba(35,40,43,0.45);
    display:flex;align-items:flex-start;justify-content:center;
    padding:2rem 1rem;
    overflow-y:auto;
    z-index:1000;
  }
  .modal{
    background:var(--white);border-radius:10px;max-width:480px;width:100%;
    padding:1.5rem 1.75rem;border:1px solid var(--paper-line);
  }
  .modal h2{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:0 0 1rem;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;margin-bottom:0.85rem;}
  .form-grid .full{grid-column:1/-1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.2rem;}
  .toast{
    font-size:12.5px;padding:9px 14px;border-radius:6px;margin:0 1.75rem 1rem;
    display:flex;align-items:center;gap:8px;
  }
  .toast.error{background:var(--stamp-bg);color:var(--stamp-dark);border:1px solid var(--stamp);}
  .toast.info{background:var(--plum-bg);color:var(--plum);border:1px solid var(--plum);}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
  .loading-row{padding:2rem;text-align:center;color:var(--ink-faint);font-size:13px;}

  .notify-banner{
    margin:0 1.75rem 1rem;
    background:var(--gold-bg);border:1px solid var(--gold);border-radius:7px;
    padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--gold);
  }
  .notify-banner button{
    margin-left:auto;border:1px solid var(--gold);background:var(--white);color:var(--gold);
    font-size:12px;font-weight:600;padding:5px 12px;border-radius:5px;cursor:pointer;
  }
  .notify-banner .dismiss{border:none;background:none;color:var(--gold);font-size:16px;cursor:pointer;padding:0 2px;margin-left:6px;}

  .section-title{
    display:flex;align-items:center;gap:8px;
    padding:0 1.75rem;margin-bottom:0.7rem;
  }
  .section-title h3{font-family:'Fraunces',serif;font-size:15.5px;font-weight:600;margin:0;}
  .section-title .dot{width:8px;height:8px;border-radius:50%;}
  .section-title.masuk .dot{background:var(--teal);}
  .section-title.keluar .dot{background:var(--plum);}
  .section-title.semua .dot{background:var(--ink);}
  .section-title .count{font-size:12px;color:var(--ink-faint);}

  .report-modal{max-width:640px;}
  .report-controls{display:flex;align-items:center;gap:10px;margin-bottom:1.1rem;}
  .report-controls input[type=month]{width:auto;flex:none;}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.2rem;}
  .stat-card{
    background:var(--paper);border:1px solid var(--paper-line);border-radius:7px;
    padding:12px 10px;text-align:center;
  }
  .stat-card .num{font-family:'Fraunces',serif;font-size:22px;font-weight:600;}
  .stat-card .lbl{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .report-table-wrap{max-height:280px;overflow-y:auto;border:1px solid var(--paper-line);border-radius:6px;}
  .report-empty{font-size:13px;color:var(--ink-faint);text-align:center;padding:2rem 0;}

  .pager{
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
    padding:12px 2px 0;
  }
  .pager-info{font-size:12px;color:var(--ink-faint);}
  .pager-controls{display:flex;align-items:center;gap:10px;}
  .pager-controls .btn{padding:6px 12px;font-size:12.5px;}
  .pager-controls .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .pager-page{font-size:12.5px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}
</style>
</head>

  function el(tag, attrs, children){
    var e = document.createElement(tag);
    attrs = attrs || {};
    for(var k in attrs){
      if(k === "class"){ e.className = attrs[k]; }
      else if(k === "html"){ e.innerHTML = attrs[k]; }
      else if(k.indexOf("on") === 0 && typeof attrs[k] === "function"){ e.addEventListener(k.slice(2), attrs[k]); }
      else { e.setAttribute(k, attrs[k]); }
    }
    (children||[]).forEach(function(c){
      if(c === null || c === undefined) return;
      if(typeof c === "string") e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
    return e;
  }
  function icon(name){ return el("i", {class:"ti ti-"+name, "aria-hidden":"true"}); }

  function b64FromArrayBuffer(buf){
    var bytes = new Uint8Array(buf);
    var chunk = 0x8000;
    var out = "";
    for(var i=0;i<bytes.length;i+=chunk){
      out += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
    }
    return btoa(out);
  }

  function connectMigrateDestination(){
    waitForGis(6000).then(function(){
      var tc = google.accounts.oauth2.initTokenClient({
        client_id: state.clientId,
        scope: "https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.email",
        prompt: "select_account consent",

          if(resp.error){ showToast("error","Gagal memilih akun tujuan: "+resp.error); render(); return; }
          state.migrateDestToken = resp.access_token;
          render();
          fetch("https://www.googleapis.com/oauth2/v3/userinfo", {headers: headersFor(state.migrateDestToken,{})})
            .then(function(r){ return r.json(); })
            .then(function(info){
              state.migrateDestEmail = info.email || "";
              if(state.connectedEmail && info.email === state.connectedEmail){
                showToast("error","Ini akun yang sama dengan yang sedang login. Pilih akun Google yang lain.");
                state.migrateDestToken = null;
                render();
                return;
              }
              ensureFolderWithToken(state.migrateDestToken).then(function(id){
                state.migrateDestFolderId = id;
                state.migrateStep = "ready";
                render();
              }).catch(function(){ showToast("error","Gagal menyiapkan folder di akun tujuan."); });
            });

    }).catch(function(){

    });

  function migrateOneFile(letter){
    return fetch("https://www.googleapis.com/drive/v3/files/"+letter.id+"?alt=media", {
      headers: apiHeaders()
    }).then(function(r){
      if(!r.ok) throw new Error("download_failed");
      return r.arrayBuffer();
    }).then(function(buf){
      var boundary = "arsipsurat_migrate_7729";
      var delimiter = "\r\n--" + boundary + "\r\n";
      var closeDelim = "\r\n--" + boundary + "--";
      var contentType = letter.mimeType || "application/octet-stream";
      var base64Data = b64FromArrayBuffer(buf);
      var metadata = {
        no_agenda: letter.no_agenda,
        no_surat: letter.no_surat, tanggal: letter.tanggal, jenis: letter.jenis,
        perihal: letter.perihal, pihak: letter.pihak, status: letter.status,
        klasifikasi: letter.klasifikasi,
        catatan_disposisi: letter.catatan_disposisi,
        disposisi_foto_link: letter.disposisi_foto_link,
        disposisi_foto_id: ""
      };
      var driveMeta = {
        name: letter.name,
        parents: [state.migrateDestFolderId],
        description: JSON.stringify(metadata)
      };
      var body =
        delimiter + "Content-Type: application/json; charset=UTF-8\r\n\r\n" + JSON.stringify(driveMeta) +
        delimiter + "Content-Type: " + contentType + "\r\nContent-Transfer-Encoding: base64\r\n\r\n" + base64Data +
        closeDelim;
      return fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
        method:"POST",
        headers: headersFor(state.migrateDestToken, {"Content-Type":'multipart/related; boundary="'+boundary+'"'}),
        body: body
      }).then(function(r){ return r.json(); }).then(function(data){
        if(data.error) throw new Error(data.error.message || "upload_failed");
        return data;
      });
    });
  }

  function runMigration(){
    state.migrateStep = "running";
    state.migrateRunning = true;
    state.migrateTotal = state.letters.length;
    state.migrateDone = 0;
    state.migrateFailed = [];
    render();
    var queue = state.letters.slice();
    function next(){
      if(queue.length === 0){
        state.migrateRunning = false;
        state.migrateStep = "done";
        render();
        return;
      }
      var letter = queue.shift();
      migrateOneFile(letter).then(function(){
        state.migrateDone++;
        render();
        next();
      }).catch(function(){
        state.migrateDone++;
        state.migrateFailed.push(letter.no_surat || letter.name);
        render();
        next();
      });
    }
    next();
  }

  function uploadDisposisiFoto(file, letterNoSurat){
    return ensureAttachmentFolder().then(function(folderId){
      return new Promise(function(resolve, reject){
        var reader = new FileReader();
        reader.onload = function(e){
          var boundary = "arsipsurat_disposisi_5510";
          var delimiter = "\r\n--" + boundary + "\r\n";
          var closeDelim = "\r\n--" + boundary + "--";
          var contentType = file.type || "application/octet-stream";
          var base64Data = b64FromArrayBuffer(e.target.result);
          var driveMeta = {
            name: "Disposisi - " + (letterNoSurat || "surat") + " - " + file.name,
            parents: [folderId]
          };
          var body =
            delimiter + "Content-Type: application/json; charset=UTF-8\r\n\r\n" + JSON.stringify(driveMeta) +
            delimiter + "Content-Type: " + contentType + "\r\nContent-Transfer-Encoding: base64\r\n\r\n" + base64Data +
            closeDelim;
          fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink", {
            method:"POST",
            headers: apiHeaders({"Content-Type":'multipart/related; boundary="'+boundary+'"'}),
            body: body
          }).then(function(r){ return r.json(); }).then(function(data){
            if(data.error) reject(new Error(data.error.message || "upload_failed"));
            else resolve(data);
          }).catch(reject);
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    });
  }

  function waitForGis(timeoutMs){
    return new Promise(function(resolve, reject){
      var waited = 0;
      var step = 200;
      var iv = setInterval(function(){
        if(typeof google !== "undefined" && google.accounts && google.accounts.oauth2){
          clearInterval(iv);
          resolve();
        } else {
          waited += step;
          if(waited >= timeoutMs){
            clearInterval(iv);
            reject(new Error("gis_unavailable"));
          }
        }
      }, step);
    });
  }

  function doConnect(clientId){
    try{
      var tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: "https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.email",
        callback: function(resp){
          state.connecting = false;
          if(resp.error){
            showToast("error", "Gagal menghubungkan: " + resp.error);
            render();
            return;
          }
          state.accessToken = resp.access_token;
          state.connected = true;
          state.clientId = clientId;
          if(window.storage){
            window.storage.set("arsip:clientId", clientId, false).catch(function(){});
          }
          render();
          fetch("https://www.googleapis.com/oauth2/v3/userinfo", {headers: apiHeaders()})
            .then(function(r){ return r.json(); })
            .then(function(info){ state.connectedEmail = info.email || ""; render(); })
            .catch(function(){});
          ensureFolder().then(function(id){
            state.folderId = id;
            if(window.storage){ window.storage.set("arsip:folderId", id, false).catch(function(){}); }
            loadLetters();
          }).catch(function(){
            showToast("error","Terhubung, tapi gagal menyiapkan folder Arsip Surat di Drive.");
          });
        }
      });
      tokenClient.requestAccessToken({prompt: "select_account"});
    }catch(e){
      state.connecting = false;
      showToast("error","Gagal memulai koneksi Google Drive. Periksa Client ID.");
      render();
    }
  }

  function submitForm(fields, fileEl){
    var editing = state.editingId ? state.letters.find(function(l){ return l.id === state.editingId; }) : null;
    if(!fields.no_surat || !fields.tanggal || !fields.perihal){
      state.formError = "Nomor surat, tanggal, dan perihal wajib diisi.";
      render();
      return;
    }
    var dupNoSurat = state.letters.some(function(l){
      return (!editing || l.id !== editing.id) && l.no_surat && l.no_surat.trim().toLowerCase() === fields.no_surat.trim().toLowerCase();
    });
    if(dupNoSurat){
      state.formError = "Nomor surat \u201c" + fields.no_surat + "\u201d sudah dipakai surat lain. Gunakan nomor yang berbeda.";
      render();
      return;
    }
    if(!editing && (!fileEl.files || fileEl.files.length === 0)){
      state.formError = "Pilih berkas surat untuk diunggah.";
      render();
      return;
    }
    state.saving = true;
    state.formError = "";
    render();

    var isKeluar = fields.jenis === "keluar";

    // Tentukan foto/scan disposisi: hapus, unggah baru, atau pertahankan yang lama
    var fotoPromise;
    if(isKeluar){
      fotoPromise = Promise.resolve({link:"", id:"", mime:""});
    } else if(state.formFotoRemove){
      fotoPromise = Promise.resolve({link:"", id:"", mime:""});
    } else if(state.formFotoFile){
      fotoPromise = uploadDisposisiFoto(state.formFotoFile, fields.no_surat).then(function(data){
        return {link: data.webViewLink || "", id: data.id || "", mime: state.formFotoFile.type || ""};
      });
    } else {
      fotoPromise = Promise.resolve({
        link: editing ? (editing.disposisi_foto_link || "") : "",
        id: editing ? (editing.disposisi_foto_id || "") : "",
        mime: editing ? (editing.disposisi_foto_mime || "") : ""
      });
    }

    fotoPromise.then(function(foto){
      var metadata = {
        no_agenda: fields.no_agenda || "",
        no_surat: fields.no_surat,
        tanggal: fields.tanggal,
        jenis: fields.jenis,
        perihal: fields.perihal,
        pihak: fields.pihak,
        status: fields.status,
        klasifikasi: fields.klasifikasi || "",
        catatan_disposisi: isKeluar ? "" : (fields.catatan_disposisi || (editing ? editing.catatan_disposisi : "") || ""),
        disposisi_foto_link: foto.link,
        disposisi_foto_id: foto.id,
        disposisi_foto_mime: foto.mime
      };

      if(editing){
        fetch("https://www.googleapis.com/drive/v3/files/"+editing.id, {
          method:"PATCH",
          headers: apiHeaders({"Content-Type":"application/json"}),
          body: JSON.stringify({description: JSON.stringify(metadata)})
        }).then(function(r){ return r.json(); }).then(function(){
          state.saving = false;
          closeForm();
          loadLetters();
          showToast("info","Data surat diperbarui.");
        }).catch(function(){
          state.saving = false;
          state.formError = "Gagal menyimpan perubahan.";
          render();
        });
        return;
      }

      var file = fileEl.files[0];
      var reader = new FileReader();
      reader.onload = function(e){
        var boundary = "arsipsurat_boundary_29a4";
        var delimiter = "\r\n--" + boundary + "\r\n";
        var closeDelim = "\r\n--" + boundary + "--";
        var contentType = file.type || "application/octet-stream";
        var base64Data = b64FromArrayBuffer(e.target.result);
        var driveMeta = {
          name: fields.no_surat.replace(/[\/\\]/g,"-") + " - " + fields.perihal.slice(0,60),
          parents: [state.folderId],
          description: JSON.stringify(metadata)
        };
        var body =
          delimiter +
          "Content-Type: application/json; charset=UTF-8\r\n\r\n" +
          JSON.stringify(driveMeta) +
          delimiter +
          "Content-Type: " + contentType + "\r\n" +
          "Content-Transfer-Encoding: base64\r\n\r\n" +
          base64Data +
          closeDelim;

        fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
          method:"POST",
          headers: apiHeaders({"Content-Type":'multipart/related; boundary="'+boundary+'"'}),
          body: body
        }).then(function(r){ return r.json(); }).then(function(data){
          state.saving = false;
          if(data.error){
            state.formError = "Gagal mengunggah: " + (data.error.message || "coba lagi.");
            render();
            return;
          }
          closeForm();
          loadLetters();
          showToast("info","Surat berhasil diarsipkan.");
        }).catch(function(){
          state.saving = false;
          state.formError = "Gagal mengunggah berkas.";
          render();
        });
      };
      reader.readAsArrayBuffer(file);
    }).catch(function(){
      state.saving = false;
      state.formError = "Gagal mengunggah foto/scan disposisi.";
      render();
    });
  }

  function deleteLetter(id){
    fetch("https://www.googleapis.com/drive/v3/files/"+id, {
      method:"DELETE",
      headers: apiHeaders()
    }).then(function(){
      state.letters = state.letters.filter(function(l){ return l.id !== id; });
      render();
      showToast("info","Surat dipindahkan ke sampah Drive.");
    }).catch(function(){
      showToast("error","Gagal menghapus surat.");
    });
  }

  function patchLetterMeta(id, patch){
    var letter = state.letters.find(function(l){ return l.id === id; });
    if(!letter) return Promise.reject();
    var metadata = {
      no_agenda: letter.no_agenda,
      no_surat: letter.no_surat, tanggal: letter.tanggal, jenis: letter.jenis,
      perihal: letter.perihal, pihak: letter.pihak, klasifikasi: letter.klasifikasi,
      status: patch.status !== undefined ? patch.status : letter.status,
      catatan_disposisi: patch.catatan_disposisi !== undefined ? patch.catatan_disposisi : letter.catatan_disposisi,
      disposisi_foto_link: patch.disposisi_foto_link !== undefined ? patch.disposisi_foto_link : letter.disposisi_foto_link,
      disposisi_foto_id: patch.disposisi_foto_id !== undefined ? patch.disposisi_foto_id : letter.disposisi_foto_id,
      disposisi_foto_mime: patch.disposisi_foto_mime !== undefined ? patch.disposisi_foto_mime : letter.disposisi_foto_mime
    };
    return fetch("https://www.googleapis.com/drive/v3/files/"+id, {
      method:"PATCH",
      headers: apiHeaders({"Content-Type":"application/json"}),
      body: JSON.stringify({description: JSON.stringify(metadata)})
    }).then(function(){
      letter.status = metadata.status;
      letter.catatan_disposisi = metadata.catatan_disposisi;
      letter.disposisi_foto_link = metadata.disposisi_foto_link;
      letter.disposisi_foto_id = metadata.disposisi_foto_id;
      letter.disposisi_foto_mime = metadata.disposisi_foto_mime;
      render();
    });
  }

  function quickStatus(id, status){
    if(status === "selesai"){
      openDisposisiModal(id, status);
      return;
    }
    patchLetterMeta(id, {status: status}).catch(function(){ showToast("error","Gagal memperbarui status."); });
  }

  function openDisposisiModal(id, pendingStatus){
    var letter = state.letters.find(function(l){ return l.id === id; });
    if(!letter) return;
    state.disposisiModalId = id;
    state.disposisiModalStatus = pendingStatus || letter.status;
    state.disposisiNoteDraft = letter.catatan_disposisi || "";
    state.disposisiFotoFile = null;
    state.disposisiFotoRemove = false;
    render();
  }
  function closeDisposisiModal(){
    state.disposisiModalId = null;
    render();
  }
  function submitDisposisiNote(){
    var id = state.disposisiModalId;
    var note = state.disposisiNoteDraft;
    var status = state.disposisiModalStatus;
    var file = state.disposisiFotoFile;
    var letter = state.letters.find(function(l){ return l.id === id; });
    state.disposisiSaving = true;
    render();

    function finishPatch(fotoLink, fotoId, fotoMime){
      var patch = {status: status, catatan_disposisi: note};
      if(fotoLink !== undefined){ patch.disposisi_foto_link = fotoLink; patch.disposisi_foto_id = fotoId; patch.disposisi_foto_mime = fotoMime || ""; }
      patchLetterMeta(id, patch).then(function(){
        state.disposisiSaving = false;
        closeDisposisiModal();
        showToast("info","Catatan disposisi disimpan.");
      }).catch(function(){
        state.disposisiSaving = false;
        showToast("error","Gagal menyimpan catatan disposisi.");
        render();
      });
    }

    if(state.disposisiFotoRemove){
      finishPatch("", "", "");
    } else if(file){
      uploadDisposisiFoto(file, letter ? letter.no_surat : "").then(function(data){
        finishPatch(data.webViewLink || "", data.id || "", file.type || "");
      }).catch(function(){
        state.disposisiSaving = false;
        showToast("error","Gagal mengunggah foto/scan disposisi.");
        render();
      });
    } else {
      finishPatch(undefined, undefined, undefined);
    }
  }

  function filteredLetters(){
    return state.letters.filter(function(l){
      if(state.jenisFilter !== "semua" && l.jenis !== state.jenisFilter) return false;
      if(state.dateFilter && l.tanggal !== state.dateFilter) return false;
      if(state.statusFilter === "__incomplete"){
        if(l.no_surat && l.perihal) return false;
      } else if(state.statusFilter !== "semua" && l.status !== state.statusFilter){
        return false;
      }
      if(state.search){
        var s = state.search.toLowerCase();
        var hay = (l.no_agenda+" "+l.no_surat+" "+l.perihal+" "+l.pihak+" "+l.name+" "+l.klasifikasi).toLowerCase();
        if(hay.indexOf(s) === -1) return false;
      }
      return true;
    });
  }

  function exportToExcel(rows, filename){
    if(typeof XLSX === "undefined"){
      showToast("error","Modul ekspor Excel belum siap. Coba lagi sebentar.");
      return;
    }
    if(rows.length === 0){
      showToast("error","Tidak ada data untuk diekspor.");
      return;
    }
    var data = rows.map(function(l){
      return {
        "No. Agenda": l.no_agenda || "",
        "No. Surat": l.no_surat,
        "Tanggal": l.tanggal,
        "Jenis": l.jenis === "keluar" ? "Keluar" : "Masuk",
        "Perihal": l.perihal,
        "Klasifikasi Arsip": l.klasifikasi || "",
        "Pengirim/Penerima": l.pihak,
        "Status Disposisi": l.jenis === "keluar" ? "" : statusLabel(l.status),
        "Catatan Disposisi": l.jenis === "keluar" ? "" : (l.catatan_disposisi || ""),
        "Link Berkas": l.webViewLink || ""
      };
    });
    var ws = XLSX.utils.json_to_sheet(data);
    ws["!cols"] = [{wch:14},{wch:20},{wch:12},{wch:10},{wch:40},{wch:34},{wch:24},{wch:16},{wch:35},{wch:40}];
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Arsip Surat");
    XLSX.writeFile(wb, filename);
    showToast("info","Berhasil diekspor ke Excel.");
  }

  function lettersInMonth(monthStr){
    return state.letters.filter(function(l){ return l.tanggal && l.tanggal.slice(0,7) === monthStr; });
  }

  function monthStats(monthStr){
    var rows = lettersInMonth(monthStr);
    var stats = {total: rows.length, masuk:0, keluar:0, selesai:0, belum:0};
    rows.forEach(function(l){
      if(l.jenis === "keluar"){ stats.keluar++; }
      else { stats.masuk++; if(l.status === "selesai") stats.selesai++; else stats.belum++; }
    });
    return {rows:rows, stats:stats};
  }

  function fmtDate(d){
    if(!d) return "\u2013";
    var parts = d.split("-");
    if(parts.length !== 3) return d;
    var months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    return parts[2] + " " + months[parseInt(parts[1],10)-1] + " " + parts[0];
  }

    var editing = state.editingId ? state.letters.find(function(l){ return l.id === state.editingId; }) : null;
    if(!state.formDraft){
      state.formDraft = {
        no_agenda: editing ? (editing.no_agenda || "") : "",
        no_surat: editing ? (editing.no_surat || "") : "",
        tanggal: editing ? (editing.tanggal || "") : "",
        jenis: editing ? editing.jenis : "masuk",
        perihal: editing ? (editing.perihal || "") : "",
        pihak: editing ? (editing.pihak || "") : "",
        status: editing && editing.status ? editing.status : "baru",
        klasifikasi: editing ? (editing.klasifikasi || "") : "",
        catatan_disposisi: editing ? (editing.catatan_disposisi || "") : ""
      };
    }
    var draft = state.formDraft;
    var noAgenda = el("input",{type:"text", placeholder:"012/2026", value: draft.no_agenda, "data-focusid":"f-no_agenda"});
    noAgenda.addEventListener("input", function(e){ draft.no_agenda = e.target.value; });
    var noSurat = el("input",{type:"text", placeholder:"005/UND/VII/2026", value: draft.no_surat, "data-focusid":"f-no_surat"});
    noSurat.addEventListener("input", function(e){ draft.no_surat = e.target.value; });
    var tanggal = el("input",{type:"date", value: draft.tanggal, "data-focusid":"f-tanggal"});
    tanggal.addEventListener("input", function(e){ draft.tanggal = e.target.value; });
    var jenis = el("select",{"data-focusid":"f-jenis"}, [
      el("option",{value:"masuk"}, ["Surat masuk"]),
      el("option",{value:"keluar"}, ["Surat keluar"])
    ]);
    jenis.value = draft.jenis;
    jenis.addEventListener("change", function(e){ draft.jenis = e.target.value; syncStatusVisibility(); });
    var perihal = el("input",{type:"text", placeholder:"Undangan rapat koordinasi\u2026", value: draft.perihal, "data-focusid":"f-perihal"});
    perihal.addEventListener("input", function(e){ draft.perihal = e.target.value; });
    var pihak = el("input",{type:"text", placeholder:"Nama instansi / orang", value: draft.pihak, "data-focusid":"f-pihak"});
    pihak.addEventListener("input", function(e){ draft.pihak = e.target.value; });
    var status = el("select",{"data-focusid":"f-status"}, STATUS_OPTIONS.map(function(o){ return el("option",{value:o.v}, [o.label]); }));
    status.value = draft.status;
    status.addEventListener("change", function(e){ draft.status = e.target.value; syncStatusVisibility(); });
    var klasifikasi = el("input",{type:"text", list:"klasifikasi-datalist", placeholder:"Ketik kode atau kata kunci, mis. \u201cKA.00.00\u201d atau \u201csurat masuk\u201d\u2026", value: draft.klasifikasi, "data-focusid":"f-klasifikasi"});
    klasifikasi.addEventListener("input", function(e){ draft.klasifikasi = e.target.value; });
    var klasifikasiList = el("datalist",{id:"klasifikasi-datalist"}, KLASIFIKASI_LIST.map(function(k){ return el("option",{value:k}); }));
    var catatan = el("textarea",{rows:2, placeholder:"Hasil/instruksi disposisi atasan (opsional)\u2026", "data-focusid":"f-catatan"});
    catatan.value = draft.catatan_disposisi;
    catatan.addEventListener("input", function(e){ draft.catatan_disposisi = e.target.value; });
    var fileInput = el("input",{type:"file"});

    var statusField = el("div",{}, [el("label",{}, ["Status disposisi"]), status]);
    var catatanField = el("div",{class:"full"}, [el("label",{}, ["Catatan disposisi atasan (tulisan)"]), catatan]);

    // --- Foto/scan disposisi (opsional, menyatu dengan form) ---
    var hasExistingFoto = editing && editing.disposisi_foto_link && !state.formFotoRemove;
    var fotoBoxWrap = el("div",{}, []);
    function renderFotoBox(){
      fotoBoxWrap.innerHTML = "";
      if(hasExistingFoto){
        var isPdf = (editing.disposisi_foto_mime || "").indexOf("pdf") !== -1;
        fotoBoxWrap.appendChild(el("div",{style:"display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--paper);border:1px solid var(--paper-line);border-radius:6px;margin-bottom:8px;"}, [
          icon(isPdf ? "file-type-pdf" : "photo"),
          el("a",{href:editing.disposisi_foto_link, target:"_blank", style:"font-size:12.5px;color:var(--stamp);flex:1;"}, [isPdf ? "Lihat berkas PDF disposisi yang tersimpan" : "Lihat foto/scan disposisi yang tersimpan"]),
          el("button",{class:"icon-btn", title:"Hapus foto ini", onclick:function(){ state.formFotoRemove = true; hasExistingFoto = false; renderFotoBox(); }}, [icon("trash")])
        ]));
      } else if(state.formFotoRemove){
        fotoBoxWrap.appendChild(el("p",{class:"hint", style:"color:var(--stamp-dark);"}, ["Foto/scan akan dihapus setelah disimpan. ",
          el("button",{onclick:function(){ state.formFotoRemove = false; hasExistingFoto = !!(editing && editing.disposisi_foto_link); renderFotoBox(); }, style:"border:none;background:none;color:var(--stamp);text-decoration:underline;cursor:pointer;font-size:12px;"}, ["Batalkan"])
        ]));
      }
    }
    renderFotoBox();
    var fotoInput = el("input",{type:"file", accept:"image/*,application/pdf"});
    var fotoFileLabel = el("p",{class:"hint"}, []);
    fotoInput.addEventListener("change", function(e){
      state.formFotoFile = e.target.files[0] || null;
      fotoFileLabel.textContent = state.formFotoFile ? ("Dipilih: " + state.formFotoFile.name) : "";
    });
    var fotoField = el("div",{class:"full"}, [
      el("label",{}, ["Catatan disposisi atasan (foto/scan)"]),
      fotoBoxWrap,
      fotoInput,
      fotoFileLabel,
      el("p",{class:"hint"}, ["Bisa foto dari kamera HP, gambar (JPG/PNG), atau berkas PDF hasil scan. Tulisan dan foto/scan boleh diisi salah satu atau keduanya."])
    ]);

    function syncStatusVisibility(){
      var hide = jenis.value === "keluar";
      statusField.style.display = hide ? "none" : "";
      var hideCatatan = hide || status.value !== "selesai";
      catatanField.style.display = hideCatatan ? "none" : "";
      fotoField.style.display = hideCatatan ? "none" : "";
    }
    syncStatusVisibility();

    var fileRow = editing
      ? el("p",{class:"hint"}, ["Berkas yang sudah diunggah tidak bisa diganti di sini. Hapus surat ini lalu tambahkan ulang jika perlu mengganti berkas."])
      : el("div",{class:"field-row full"}, [ el("label",{}, ["Berkas surat"]), fileInput ]);

    var errorBox = state.formError ? el("div",{class:"toast error", style:"margin:0 0 0.85rem;"}, [icon("alert-circle"), state.formError]) : null;

    var saveBtn = el("button",{class:"btn btn-primary", onclick:function(){
      submitForm({
        no_agenda: noAgenda.value.trim(),
        no_surat: noSurat.value.trim(),
        tanggal: tanggal.value,
        jenis: jenis.value,
        perihal: perihal.value.trim(),
        pihak: pihak.value.trim(),
        status: jenis.value === "keluar" ? "" : status.value,
        klasifikasi: klasifikasi.value.trim(),
        catatan_disposisi: jenis.value === "keluar" ? "" : catatan.value.trim()
      }, fileInput);
    }}, [state.saving ? "Menyimpan\u2026" : "Simpan"]);
    if(state.saving) saveBtn.disabled = true;

    var modal = el("div",{class:"modal"}, [
      el("h2",{}, [editing ? "Ubah data surat" : "Tambah surat baru"]),
      errorBox,
      klasifikasiList,
      el("div",{class:"form-grid"}, [
        el("div",{}, [el("label",{}, ["No. Agenda"]), noAgenda]),
        el("div",{}, [el("label",{}, ["Nomor surat"]), noSurat]),
        el("div",{}, [el("label",{}, ["Tanggal"]), tanggal]),
        el("div",{}, [el("label",{}, ["Jenis"]), jenis]),
        statusField,
        el("div",{class:"full"}, [el("label",{}, ["Perihal"]), perihal]),
        el("div",{class:"full"}, [el("label",{}, ["Pengirim / penerima"]), pihak]),
        el("div",{class:"full"}, [el("label",{}, ["Klasifikasi Arsip"]), klasifikasi]),
        catatanField,
        fotoField,
        fileRow
      ]),
      el("div",{class:"modal-actions"}, [
        el("button",{class:"btn", onclick:closeForm}, ["Batal"]),
        saveBtn
      ])
    ]);
    return el("div",{class:"modal-backdrop"}, [modal]);
  }

  function renderDisposisiModal(){
    var letter = state.letters.find(function(l){ return l.id === state.disposisiModalId; });
    if(!letter) return null;
    var isCompleting = state.disposisiModalStatus === "selesai";
    var textarea = el("textarea",{rows:4, placeholder:"Tuliskan instruksi atau hasil disposisi dari atasan, mis. \u201cSetujui, teruskan ke bagian keuangan\u201d\u2026 (opsional kalau sudah ada foto/scan)"}, []);
    textarea.value = state.disposisiNoteDraft;
    textarea.addEventListener("input", function(e){ state.disposisiNoteDraft = e.target.value; });

    var statusNote = isCompleting
      ? el("p",{class:"hint"}, ["Status akan diubah menjadi ", el("strong",{},["Selesai"]), " setelah catatan disimpan."])
      : el("p",{class:"hint"}, ["Mengubah atau menambahkan catatan tanpa mengubah status surat."]);

    // --- Foto/scan disposisi ---
    var hasExistingFoto = letter.disposisi_foto_link && !state.disposisiFotoRemove;
    var fotoSection = [];
    if(hasExistingFoto){
      var isPdf = (letter.disposisi_foto_mime || "").indexOf("pdf") !== -1;
      fotoSection.push(el("div",{style:"display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--paper);border:1px solid var(--paper-line);border-radius:6px;margin-bottom:8px;"}, [
        icon(isPdf ? "file-type-pdf" : "photo"),
        el("a",{href:letter.disposisi_foto_link, target:"_blank", style:"font-size:12.5px;color:var(--stamp);flex:1;"}, [isPdf ? "Lihat berkas PDF disposisi yang tersimpan" : "Lihat foto/scan disposisi yang tersimpan"]),
        el("button",{class:"icon-btn", title:"Hapus foto ini", onclick:function(){ state.disposisiFotoRemove = true; render(); }}, [icon("trash")])
      ]));
    } else if(state.disposisiFotoRemove){
      fotoSection.push(el("p",{class:"hint", style:"color:var(--stamp-dark);"}, ["Foto/scan akan dihapus setelah disimpan.",
        el("button",{onclick:function(){ state.disposisiFotoRemove = false; render(); }, style:"margin-left:8px;border:none;background:none;color:var(--stamp);text-decoration:underline;cursor:pointer;font-size:12px;"}, ["Batalkan"])
      ]));
    }
    var fotoInput = el("input",{type:"file", accept:"image/*,application/pdf"});
    fotoInput.addEventListener("change", function(e){
      state.disposisiFotoFile = e.target.files[0] || null;
      render();
    });
    fotoSection.push(el("div",{class:"field-row"}, [
      el("label",{}, [hasExistingFoto ? "Ganti foto/scan" : "Foto/scan disposisi (opsional)"]),
      fotoInput,
      state.disposisiFotoFile ? el("p",{class:"hint"}, ["Dipilih: " + state.disposisiFotoFile.name]) : null,
      el("p",{class:"hint"}, ["Bisa foto dari kamera HP, gambar (JPG/PNG), atau berkas hasil scan berformat PDF."])
    ]));

    var saveBtn = el("button",{class:"btn btn-primary", onclick: submitDisposisiNote}, [state.disposisiSaving ? "Menyimpan\u2026" : (isCompleting ? "Simpan \u0026 tandai selesai" : "Simpan catatan")]);
    if(state.disposisiSaving) saveBtn.disabled = true;

    var modal = el("div",{class:"modal"}, [
      el("h2",{}, ["Catatan disposisi atasan"]),
      el("p",{class:"hint", style:"margin-bottom:0.8rem;"}, [el("strong",{},[letter.no_surat || letter.name]), " \u2014 ", letter.perihal || ""]),
      el("div",{class:"field-row"}, [
        el("label",{}, ["Hasil / instruksi disposisi (teks)"]),
        textarea
      ]),
      el("div",{}, fotoSection),
      statusNote,
      el("div",{class:"modal-actions"}, [
        el("button",{class:"btn", onclick:closeDisposisiModal}, ["Batal"]),
        saveBtn
      ])
    ]);
    return el("div",{class:"modal-backdrop"}, [modal]);
  }

  function renderReportModal(){
    var monthInput = el("input",{type:"month", value: state.reportMonth});
    monthInput.addEventListener("change", function(e){ state.reportMonth = e.target.value; render(); });

    var res = monthStats(state.reportMonth);
    var s = res.stats;
    var monthLabelParts = state.reportMonth.split("-");
    var monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    var monthLabel = monthLabelParts.length===2 ? monthNames[parseInt(monthLabelParts[1],10)-1] + " " + monthLabelParts[0] : state.reportMonth;

    var statCards = el("div",{class:"stat-grid"}, [
      el("div",{class:"stat-card"}, [el("div",{class:"num"}, [String(s.total)]), el("div",{class:"lbl"}, ["Total surat"])]),
      el("div",{class:"stat-card"}, [el("div",{class:"num"}, [String(s.masuk)]), el("div",{class:"lbl"}, ["Surat masuk"])]),
      el("div",{class:"stat-card"}, [el("div",{class:"num"}, [String(s.keluar)]), el("div",{class:"lbl"}, ["Surat keluar"])]),
      el("div",{class:"stat-card"}, [el("div",{class:"num"}, [String(s.belum)]), el("div",{class:"lbl"}, ["Masuk belum selesai"])])
    ]);

    var tableBody;
    if(res.rows.length === 0){
      tableBody = el("div",{class:"report-empty"}, ["Tidak ada surat pada bulan " + monthLabel + "."]);
    } else {
      tableBody = el("div",{class:"report-table-wrap"}, [
        el("table",{class:"ledger"}, [
          el("thead",{}, [el("tr",{}, [
            el("th",{}, ["No. Agenda"]), el("th",{}, ["No. surat"]), el("th",{}, ["Tanggal"]), el("th",{}, ["Perihal"]), el("th",{}, ["Jenis"]), el("th",{}, ["Status"])
          ])]),
          el("tbody",{}, res.rows.map(function(l){
            return el("tr",{}, [
              el("td",{}, [el("span",{class:"no-surat"}, [l.no_agenda || "\u2013"])]),
              el("td",{}, [el("span",{class:"no-surat"}, [l.no_surat || "\u2013"])]),
              el("td",{}, [fmtDate(l.tanggal)]),
              el("td",{}, [l.perihal || "\u2013"]),
              el("td",{}, [el("span",{class:"badge "+(l.jenis==="keluar"?"keluar":"masuk")}, [l.jenis==="keluar" ? "Keluar" : "Masuk"])]),
              el("td",{}, [l.jenis === "keluar" ? "\u2013" : statusLabel(l.status)])
            ]);
          }))
        ])
      ]);
    }

    var modal = el("div",{class:"modal report-modal"}, [
      el("h2",{}, ["Laporan bulanan"]),
      el("div",{class:"report-controls"}, [
        monthInput,
        el("span",{style:"font-size:12.5px;color:var(--ink-soft);"}, [monthLabel]),
        el("div",{style:"flex:1"}),
        el("button",{class:"btn", onclick:function(){ exportToExcel(res.rows, "laporan-surat-"+state.reportMonth+".xlsx"); }}, [icon("file-spreadsheet"), " Ekspor bulan ini"])
      ]),
      statCards,
      tableBody,
      el("div",{class:"modal-actions"}, [
        el("button",{class:"btn", onclick:closeReport}, ["Tutup"])
      ])
    ]);
    return el("div",{class:"modal-backdrop"}, [modal]);
  }

  function renderMigrateModal(){
    var body;
    if(state.migrateStep === "intro"){
      body = [
        el("p",{class:"hint", style:"font-size:13px;color:var(--ink-soft);margin-bottom:1rem;"}, [
          "Ini akan menyalin seluruh " + state.letters.length + " surat (berkas + datanya) dari akun ",
          el("strong",{},[state.connectedEmail || "ini"]),
          " ke folder \u201c" + FOLDER_NAME + "\u201d di akun Google lain. Berkas asli di akun ini ", el("strong",{},["tidak dihapus"]), " \u2014 kamu bisa hapus manual nanti setelah memastikan semuanya tersalin dengan benar."
        ]),
        el("button",{class:"btn btn-primary", onclick: connectMigrateDestination}, [icon("login"), " Pilih akun Google tujuan"])
      ];
    } else if(state.migrateStep === "ready"){
      body = [
        el("p",{class:"hint", style:"font-size:13px;margin-bottom:1rem;"}, [
          "Akun tujuan: ", el("strong",{},[state.migrateDestEmail]), ". Siap menyalin ", el("strong",{},[String(state.letters.length)]), " surat. Proses berjalan satu per satu dan bisa memakan waktu untuk banyak surat \u2014 jangan tutup halaman ini selama proses berlangsung."
        ]),
        el("button",{class:"btn btn-primary", onclick: runMigration}, [icon("copy"), " Mulai migrasi"])
      ];
    } else if(state.migrateStep === "running"){
      body = [
        el("p",{class:"hint", style:"font-size:13px;margin-bottom:0.5rem;"}, ["Menyalin surat, mohon tunggu\u2026"]),
        el("p",{style:"font-family:'IBM Plex Mono',monospace;font-size:13px;"}, [state.migrateDone + " / " + state.migrateTotal + " selesai"])
      ];
    } else {
      body = [
        el("p",{class:"hint", style:"font-size:13px;margin-bottom:0.5rem;"}, [
          "Selesai. Berhasil menyalin " + (state.migrateTotal - state.migrateFailed.length) + " dari " + state.migrateTotal + " surat ke ", el("strong",{},[state.migrateDestEmail]), "."
        ]),
        state.migrateFailed.length > 0 ? el("p",{class:"hint", style:"color:var(--stamp-dark);font-size:12.5px;"}, ["Gagal: " + state.migrateFailed.join(", ") + ". Coba ulangi migrasi untuk yang gagal, atau tambahkan manual."]) : null,
        el("p",{class:"hint", style:"font-size:12.5px;"}, ["Sekarang kamu bisa login ke aplikasi ini dengan akun " + state.migrateDestEmail + " untuk memakai arsip yang baru, lalu hapus folder \u201c" + FOLDER_NAME + "\u201d di akun lama untuk membebaskan ruang penyimpanan."])
      ];
    }
    var modal = el("div",{class:"modal"}, [
      el("h2",{}, ["Migrasi ke akun Google lain"]),
      el("div",{}, body),
      el("div",{class:"modal-actions"}, [
        el("button",{class:"btn", onclick:closeMigrate}, [state.migrateStep==="done" ? "Tutup" : "Batal"])
      ])
    ]);
    return el("div",{class:"modal-backdrop"}, [modal]);
  }

  function render(){
    var root = document.getElementById("root");

    var active = document.activeElement;
    var focusId = (active && active.dataset) ? active.dataset.focusid : null;
    var selStart = active ? active.selectionStart : null;
    var selEnd = active ? active.selectionEnd : null;

    root.innerHTML = "";
    root.appendChild(renderMasthead());

    if(state.toast){
      root.appendChild(el("div",{class:"toast "+state.toast.type}, [icon(state.toast.type==="error"?"alert-circle":"info-circle"), state.toast.msg]));
    }

    if(!state.connected){
      root.appendChild(renderSetup());
      restoreFocus(focusId, selStart, selEnd);
      return;
    }

    var banner = renderBanner();
    if(banner) root.appendChild(banner);

    root.appendChild(renderToolbar());
    root.appendChild(renderSectionTitle());
    root.appendChild(el("div",{class:"ledger-wrap"}, [renderTable()]));

    if(state.showForm){
      root.appendChild(renderForm());
    }
    if(state.disposisiModalId){
      root.appendChild(renderDisposisiModal());
    }
    if(state.showMigrate){
      root.appendChild(renderMigrateModal());
    }
    if(state.showReport){
      root.appendChild(renderReportModal());
    }
    restoreFocus(focusId, selStart, selEnd);
  }

  function restoreFocus(focusId, selStart, selEnd){
    if(!focusId) return;
    var target = document.querySelector('[data-focusid="'+focusId+'"]');
    if(!target) return;
    target.focus();
    if(typeof selStart === "number" && target.setSelectionRange){
      try{ target.setSelectionRange(selStart, selEnd); }catch(e){}
    }
  }

  function init(){
    render();
    if(window.storage){
      window.storage.get("arsip:clientId", false).then(function(r){
        if(r && r.value){
          state.clientIdInput = r.value;
          render();
        }
      }).catch(function(){});
      window.storage.get("arsip:folderId", false).then(function(r){
        if(r && r.value){ state.folderId = r.value; }
      }).catch(function(){});
    }
  }

  init();
})();
</script>
</body>
</html>
